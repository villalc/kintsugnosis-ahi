[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "telemetry-api"
version = "0.1.0"
description = "FastAPI Service for AHI Neuromorphic Telemetry"
requires-python = ">=3.9"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "pydantic",
    "malbolge-core"
]

[tool.hatch.build.targets.wheel]
packages = ["src/telemetry_api"]

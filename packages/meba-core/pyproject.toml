[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "meba-core"
version = "0.1.0"
description = "Marco de Evaluación de Bienestar Algorítmico (MEBA) Core"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "AHI 3.0 & Sovereign Symbiosis Foundation", email = "enterprise@ahigovernance.com"}
]
dependencies = [
    "numpy>=1.21.0",
]

[tool.setuptools.packages.find]
where = ["src"]

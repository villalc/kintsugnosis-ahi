name: Physics Integrity Audit (The Ricci Sentinel)

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/functions-geometry/core/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/functions-geometry/core/**'

jobs:
  audit-reality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch numpy pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run The Ethical Beacon (Integrity Test)
      run: |
        # Set PYTHONPATH to include the current package level
        export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/packages/functions-geometry
        pytest packages/functions-geometry/tests/test_integrity.py -v

name: Python CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/meba-core/**'
      - 'requirements.txt'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/meba-core/**'
      - 'requirements.txt'
      - '.github/workflows/python-ci.yml'

permissions:
  contents: read

jobs:
  test:
    name: Test Python Components
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install local packages in editable mode
          pip install -e packages/meba-core

      - name: Run MEBA Core tests
        run: |
          pytest packages/meba-core/tests/ -v --tb=short

  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint MEBA Core
        run: |
          # Enforce critical errors only; this run can fail the build.
          flake8 packages/meba-core/src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Gather full lint statistics and warnings; --exit-zero ensures this run does not block the build.
          flake8 packages/meba-core/src/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
